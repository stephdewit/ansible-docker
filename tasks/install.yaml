- name: Uninstall old versions
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
- name: Download GPG key
  ansible.builtin.copy:
    content: >-
      {{ lookup(
        'ansible.builtin.url',
        docker_apt_repository.gpg_key.url,
        split_lines=False)
      }}
    dest: "{{ docker_apt_repository.gpg_key.path }}.ascii"
    mode: "0644"
  notify: Dearmor GPG key
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Add APT repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: "{{ docker_apt_repository.url }}"
    suites: "{{ docker_apt_repository.distribution }}"
    components: "{{ docker_apt_repository.components }}"
    architectures: "{{ docker_apt_repository.arch }}"
    signed_by: "{{ docker_apt_repository.gpg_key.path }}"
    state: present
- name: Install
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
- name: Configure API version
  ansible.builtin.template:
    src: 20-api-version.conf.j2
    dest: "{{ docker_systemd_unit_directory }}/20-api-version.conf"
    mode: "0644"
  when: docker_min_api_version is defined
  notify:
    - Reload Systemd
    - Restart Docker service
- name: Configure default API version
  ansible.builtin.file:
    path: "{{ docker_systemd_unit_directory }}/20-api-version.conf"
    state: absent
  when: docker_min_api_version is undefined
  notify:
    - Reload Systemd
    - Restart Docker service
